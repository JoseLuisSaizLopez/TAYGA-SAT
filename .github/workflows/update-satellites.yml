name: Update Satellite Data

on:
  schedule:
    # Run every 24 hours at 06:00 UTC
    - cron: '0 6 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download CelesTrak satellite data
        run: |
          mkdir -p data
          curl -L --retry 3 --retry-delay 10 \
            -o data/satellites.json \
            "https://celestrak.org/NORAD/elements/gp.php?GROUP=active&FORMAT=json"
          
          # Validate the JSON file
          python3 -c "
          import json, sys
          try:
              with open('data/satellites.json') as f:
                  data = json.load(f)
              if not isinstance(data, list) or len(data) < 100:
                  print(f'Warning: Only {len(data)} satellites found')
                  sys.exit(1)
              print(f'✓ Valid JSON with {len(data)} satellites')
          except Exception as e:
              print(f'✗ Invalid JSON: {e}')
              sys.exit(1)
          "

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/satellites.json
          
          # Only commit if there are changes
          if git diff --staged --quiet; then
            echo "No changes detected"
          else
            git commit -m "🛰️ Auto-update satellite data ($(date -u +%Y-%m-%dT%H:%M:%SZ))"
            git push
          fi
